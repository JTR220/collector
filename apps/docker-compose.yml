services:
  postgres:
    image: postgres:17-alpine
    container_name: collector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cree collector_price et collector_notifications (volume vierge uniquement)
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collector"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: collector-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend/auth-service
    container_name: collector-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: collector
      DB_PORT: 5432
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: collector-jwt-secret-dev
    ports:
      - "8080:8080"

  catalog-service:
    build:
      context: ./backend/catalog-service
    container_name: collector-catalog-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # service_started (pas healthy) : le publisher se connecte en arriere-plan,
      # le service doit demarrer meme sans broker.
      rabbitmq:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: collector
      DB_PORT: 5432
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: collector-jwt-secret-dev
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8081:8081"
    volumes:
      - catalog_uploads:/app/uploads

  price-tracker:
    build:
      context: ./backend/price-tracker-service
      dockerfile: Dockerfile
    container_name: collector-price-tracker
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_DSN: "postgres://postgres:postgres@postgres:5432/collector_price?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_EXCHANGE_EVENTS: "collector.events"
      RABBITMQ_EXCHANGE_ALERTS: "collector.alerts"
      RABBITMQ_QUEUE_PRICE_UPDATE: "price-tracker.price.updated"
      SPIKE_THRESHOLD_PERCENT: "50"
      SPIKE_WINDOW_HOURS: "24"
      FLOOD_MAX_UPDATES: "5"
      FLOOD_WINDOW_MINUTES: "60"
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: collector-notification-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DATABASE_DSN: "postgres://postgres:postgres@postgres:5432/collector_notifications?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_EXCHANGE_EVENTS: "collector.events"
      RABBITMQ_EXCHANGE_ALERTS: "collector.alerts"
      RABBITMQ_QUEUE_PRICE_NOTIF: "notification-service.price.updated"
      RABBITMQ_QUEUE_FRAUD_NOTIF: "notification-service.fraud.alert"
      # Doit etre identique a auth-service : c'est lui qui signe les tokens.
      JWT_SECRET: "collector-jwt-secret-dev"
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  collector-front:
    build:
      context: ./collector-front
      # Dockerfile = image de production (adapter-node) buildée par la CI ;
      # en local on garde le serveur de dev Vite avec HMR.
      dockerfile: Dockerfile.dev
    container_name: collector-front
    restart: unless-stopped
    depends_on:
      - auth-service
      - catalog-service
    environment:
      VITE_CATALOG_API_BASE_URL: http://localhost:8081
      VITE_AUTH_API_BASE_URL: http://localhost:8080
      VITE_NOTIFICATION_API_BASE_URL: http://localhost:8083
      VITE_PRICE_TRACKER_API_BASE_URL: http://localhost:8082
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  catalog_uploads:
