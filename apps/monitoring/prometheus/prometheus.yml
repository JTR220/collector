global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Port 9100 : serveur HTTP interne dedie a /metrics (metrics.Serve /
  # metricsSrv dans chaque service), distinct du port applicatif public
  # (8080-8083) pour ne jamais exposer /metrics via l'ingress en k8s.
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:9100"]

  - job_name: catalog-service
    metrics_path: /metrics
    static_configs:
      - targets: ["catalog-service:9100"]

  - job_name: price-tracker-service
    metrics_path: /metrics
    static_configs:
      - targets: ["price-tracker:9100"]

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:9100"]
