services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: collector-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-price:
    image: postgres:16-alpine
    container_name: collector-postgres-price
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collector_price
    volumes:
      - postgres-price-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    container_name: collector-postgres-notifications
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collector_notifications
    volumes:
      - postgres-notif-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Services ────────────────────────────────────────────────────────────────
  price-tracker:
    build:
      context: ./price-tracker-service
      dockerfile: Dockerfile
    container_name: collector-price-tracker
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_DSN: "postgres://postgres:postgres@postgres-price:5432/collector_price?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_EXCHANGE_EVENTS: "collector.events"
      RABBITMQ_EXCHANGE_ALERTS: "collector.alerts"
      RABBITMQ_QUEUE_PRICE_UPDATE: "price-tracker.price.updated"
      SPIKE_THRESHOLD_PERCENT: "50"
      SPIKE_WINDOW_HOURS: "24"
      FLOOD_MAX_UPDATES: "5"
      FLOOD_WINDOW_MINUTES: "60"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-price:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: collector-notification-service
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DATABASE_DSN: "postgres://postgres:postgres@postgres-notifications:5432/collector_notifications?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_EXCHANGE_EVENTS: "collector.events"
      RABBITMQ_EXCHANGE_ALERTS: "collector.alerts"
      RABBITMQ_QUEUE_PRICE_NOTIF: "notification-service.price.updated"
      RABBITMQ_QUEUE_FRAUD_NOTIF: "notification-service.fraud.alert"
      JWT_SECRET: "change-me-in-production"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-notifications:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-price-data:
  postgres-notif-data:
