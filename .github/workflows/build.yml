  name: Global Backend DevSecOps CI

  on:
    push:
      branches: [main]
      paths:
        - "apps/backend/**"
    pull_request:
      branches: [main]
      paths:
        - "apps/backend/**"

  permissions:
    contents: read
    security-events: write

  concurrency:
    group: backend-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    build-test:
      name: Build & Tests (${{ matrix.service }})
      runs-on: ubuntu-latest

      strategy:
        fail-fast: false
        matrix:
          service:
            - auth-service
            - catalog-service

      defaults:
        run:
          working-directory: apps/backend/${{ matrix.service }}

      steps:
        - uses: actions/checkout@v4

        - name: Setup Go
          uses: actions/setup-go@v5
          with:
            go-version-file: apps/backend/${{ matrix.service }}/go.mod
            cache: true
            cache-dependency-path: apps/backend/${{ matrix.service }}/go.sum

        - name: Check formatting
          run: |
            if [ -n "$(gofmt -l .)" ]; then
              echo "Go formatting errors detected:"
              gofmt -l .
              exit 1
            fi

        - name: Go Vet
          run: go vet ./...

        - name: Run Tests
          run: |
            go test -race \
              -covermode=atomic \
              -coverprofile=coverage.out \
              ./...

        - name: Upload coverage
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: coverage-${{ matrix.service }}
            path: apps/backend/${{ matrix.service }}/coverage.out

    sonarcloud:
      name: SonarCloud (${{ matrix.service }})
      needs: build-test

      runs-on: ubuntu-latest

      strategy:
        fail-fast: false
        matrix:
          service:
            - auth-service
            - catalog-service

      defaults:
        run:
          working-directory: apps/backend/${{ matrix.service }}

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - uses: actions/download-artifact@v4
          with:
            name: coverage-${{ matrix.service }}
            path: apps/backend/${{ matrix.service }}

        - name: SonarCloud Scan
          uses: sonarsource/sonarqube-scan-action@v6
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          with:
            args: >
              -Dsonar.projectKey=JTR220_collector
              -Dsonar.organization=jtr220
              -Dsonar.sources=.
              -Dsonar.go.coverage.reportPaths=coverage.out
              -Dsonar.exclusions=**/*_test.go

    security:
      name: Security (${{ matrix.service }})
      needs: build-test

      runs-on: ubuntu-latest

      strategy:
        fail-fast: false
        matrix:
          service:
            - auth-service
            - catalog-service

      defaults:
        run:
          working-directory: apps/backend/${{ matrix.service }}

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-go@v5
          with:
            go-version-file: apps/backend/${{ matrix.service }}/go.mod

        - name: Install tools
          run: |
            go install github.com/securego/gosec/v2/cmd/gosec@latest
            go install golang.org/x/vuln/cmd/govulncheck@latest

        - name: Run gosec (JSON)
          run: gosec -fmt=json -out=gosec-report.json ./...

        - name: Run gosec (SARIF)
          if: always()
          run: |
            gosec -fmt=sarif -out=gosec.sarif ./... || true

        - name: Upload SARIF
          if: always()
          uses: github/codeql-action/upload-sarif@v4
          with:
            sarif_file: apps/backend/${{ matrix.service }}/gosec.sarif

        - name: Run govulncheck
          run: |
            govulncheck -format json ./... > govulncheck-report.json

        - name: Upload reports
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: security-${{ matrix.service }}
            path: |
              apps/backend/${{ matrix.service }}/gosec-report.json
              apps/backend/${{ matrix.service }}/gosec.sarif
              apps/backend/${{ matrix.service }}/govulncheck-report.json

    gitleaks:
      name: Secret Scan

      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - uses: gitleaks/gitleaks-action@v2
