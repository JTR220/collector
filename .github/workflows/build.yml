name: Global Backend DevSecOps CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'

jobs:
  build-test:
    name: Build & Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, catalog-service]

    defaults:
      run:
        working-directory: apps/backend/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/${{ matrix.service }}/go.mod
          cache: true
          cache-dependency-path: apps/backend/${{ matrix.service }}/go.sum

      - name: Go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Formatage Go incorrect detecte"
            exit 1
          fi

      - name: Go test with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.service }}
          path: apps/backend/${{ matrix.service }}/coverage.out

  sonarcloud:
    name: Code Quality (${{ matrix.service }})
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, catalog-service]

    defaults:
      run:
        working-directory: apps/backend/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ matrix.service }}
          path: apps/backend/${{ matrix.service }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JTR220_collector_${{ matrix.service }}
            -Dsonar.organization=jtr220
            -Dsonar.sources=.
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.exclusions=**/*_test.go

  security-scans:
    name: Security Scans (${{ matrix.service }})
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, catalog-service]

    defaults:
      run:
        working-directory: apps/backend/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/${{ matrix.service }}/go.mod

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: SAST (gosec JSON)
        run: gosec -fmt=json -out=gosec-report.json ./...

      - name: SAST (gosec SARIF)
        if: always()
        run: gosec -fmt=sarif -out=gosec.sarif ./... || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: apps/backend/${{ matrix.service }}/gosec.sarif

      - name: SCA (govulncheck)
        run: govulncheck -format json ./... > govulncheck-report.json

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ matrix.service }}
          path: |
            apps/backend/${{ matrix.service }}/gosec-report.json
            apps/backend/${{ matrix.service }}/gosec.sarif
            apps/backend/${{ matrix.service }}/govulncheck-report.json

  secrets-gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
