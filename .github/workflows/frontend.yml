name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/collector-front/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/collector-front/**'
      - '.github/workflows/frontend.yml'

jobs:
  quality:
    name: Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Build
        run: npm run build

  tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test
