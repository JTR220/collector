# Pipeline DevSecOps frontend — voir docs/DEVSECOPS.md pour le mapping complet des étapes.

name: Frontend DevSecOps CI

on:
  push:
    branches: [main, master]
    paths:
      - "apps/collector-front/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/collector-front/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Étape 1 — Lint (eslint + prettier), svelte-check et build
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint, Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Svelte check
        run: npm run check

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 1 — Tests (vitest)
  # ────────────────────────────────────────────────────────────────────────────
  tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 2 — SAST : Semgrep (XSS, prototype pollution, open redirect…)
  # Rapport SARIF complet dans l'onglet Security + passe bloquante sur ERROR
  # ────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST Semgrep
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v7

      - name: Semgrep scan (rapport SARIF complet)
        run: semgrep scan --config auto --sarif --output semgrep.sarif apps/collector-front

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-frontend

      - name: Semgrep scan (bloquant sur sévérité ERROR)
        run: semgrep scan --config auto --severity ERROR --error apps/collector-front

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 4 — SCA : Trivy fs sur le lockfile npm (bloquant CRITICAL/HIGH)
  # + npm audit complet en informatif (centaines de packages transitifs)
  # ────────────────────────────────────────────────────────────────────────────
  sca:
    name: SCA dépendances npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7

      - name: Trivy fs scan (bloquant CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/collector-front
          format: sarif
          output: trivy-front-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-front-deps.sarif
          category: trivy-frontend-deps

      - name: npm audit (informatif)
        if: always()
        working-directory: apps/collector-front
        run: npm audit --audit-level=high || true

  # ────────────────────────────────────────────────────────────────────────────
  # Étapes 5-9 — hadolint, build multi-stage adapter-node, scan Trivy AVANT push,
  # push GHCR taggé par SHA, SBOM syft, signature + attestation cosign keyless
  #
  # NB : image agnostique de l'environnement — les URLs d'API sont lues au
  # runtime via $env/dynamic/public (PUBLIC_*, ConfigMap collector-front-config).
  # La MÊME image sert staging et prod ; seule la config de pod change.
  # ────────────────────────────────────────────────────────────────────────────
  image:
    name: Image collector-front
    needs: [quality, tests, sast, sca]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write # cosign keyless via OIDC

    steps:
      - uses: actions/checkout@v7

      # Étape 5 — lint du Dockerfile
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/collector-front/Dockerfile

      - name: Compute image name (lowercase)
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/collector-front" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Build (local, jamais poussé avant scan)
        uses: docker/build-push-action@v7
        with:
          context: apps/collector-front
          load: true
          tags: ${{ env.IMAGE }}:scan
          # Image agnostique de l'environnement : les URLs d'API sont lues au
          # runtime (PUBLIC_* via la ConfigMap collector-front-config), plus
          # aucun build-arg VITE_* à injecter ici.
          cache-from: type=gha,scope=collector-front
          cache-to: type=gha,mode=max,scope=collector-front

      # Étape 6 — scan de l'image complète, bloquant sur CRITICAL/HIGH
      - name: Trivy image scan (bloquant CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-collector-front.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-collector-front.sarif
          category: trivy-collector-front

      # Étape 9 — push vers GHCR, taggé par SHA de commit (jamais "latest")
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Push
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: apps/collector-front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=collector-front

      # Étape 7 — SBOM SPDX générée depuis l'image poussée
      - name: Generate SBOM (syft)
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom-collector-front.spdx.json
          artifact-name: sbom-collector-front.spdx.json

      # Étape 8 — signature keyless (OIDC GitHub → Rekor) + attestation SBOM
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM (cosign)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate "sbom-collector-front.spdx.json" "${IMAGE}@${DIGEST}"

      - name: Export digest for GitOps job
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          echo "${IMAGE}@${{ steps.push.outputs.digest }}" > /tmp/digests/collector-front

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: digest-collector-front
          path: /tmp/digests/collector-front

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 10/11 — GitOps : commit du nouveau digest dans l'overlay staging.
  # ────────────────────────────────────────────────────────────────────────────
  update-manifests:
    name: GitOps — déploiement staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: image
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: gitops-update-manifests # partagé avec la CI backend pour éviter les push concurrents

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Pin new image digest in staging overlay
        working-directory: infra/k8s/overlays/staging
        run: |
          for f in /tmp/digests/*; do
            ref="$(cat "$f")"
            name="${ref%@*}"
            echo "→ ${ref}"
            kustomize edit set image "${name}=${ref}"
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Manifests déjà à jour, rien à committer."
            exit 0
          fi
          git commit -m "ci(gitops): deploy frontend ${GITHUB_SHA::7} to staging"
          git pull --rebase origin main
          git push origin main

  # ────────────────────────────────────────────────────────────────────────────
  # Promotion prod — ouvre une Pull Request vers la branche "master" (celle que
  # suit collector-prod dans Argo CD) avec le digest fraîchement validé. Ne
  # merge JAMAIS automatiquement : la revue + le clic "Merge" sur GitHub sont
  # le premier garde-fou humain, le clic "Sync" dans Argo CD le second.
  # ────────────────────────────────────────────────────────────────────────────
  promote-prod:
    name: GitOps — PR de promotion prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: update-manifests
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Pin new image digest in prod overlay
        working-directory: infra/k8s/overlays/prod
        run: |
          for f in /tmp/digests/*; do
            ref="$(cat "$f")"
            name="${ref%@*}"
            echo "→ ${ref}"
            kustomize edit set image "${name}=${ref}"
          done

      - name: Commit, push & open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Digest déjà à jour en prod, rien à promouvoir."
            exit 0
          fi
          BRANCH="promote-prod/frontend"
          git checkout -B "$BRANCH"
          git commit -m "ci(gitops): promote frontend ${GITHUB_SHA::7} to prod"
          git push --force origin "$BRANCH"
          # Une seule branche/PR de promotion frontend, mise à jour à chaque
          # push au lieu d'en créer une nouvelle par SHA (évite l'accumulation
          # de branches promote-prod/frontend-<sha>).
          # "Allow GitHub Actions to create pull requests" peut être désactivé
          # sur le repo : dans ce cas la branche est quand même poussée, il
          # suffit d'ouvrir la PR à la main via le lien ci-dessous.
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --base master --head "$BRANCH" \
              --title "Promote frontend to prod" \
              --body "Digest validé par le pipeline CI (lint, tests, SAST, SCA, scans Trivy, signature cosign) sur \`main\` @ ${GITHUB_SHA}. Merge = promotion vers master ; le sync Argo CD collector-prod reste manuel après." \
              || echo "::warning::PR non créée automatiquement (permissions GitHub Actions). Ouvre-la à la main : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/new/${BRANCH}"
          else
            gh pr edit "$BRANCH" --body "Digest validé par le pipeline CI (lint, tests, SAST, SCA, scans Trivy, signature cosign) sur \`main\` @ ${GITHUB_SHA}. Merge = promotion vers master ; le sync Argo CD collector-prod reste manuel après."
          fi
