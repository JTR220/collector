# Pipeline DevSecOps frontend — voir docs/DEVSECOPS.md pour le mapping complet des étapes.

name: Frontend DevSecOps CI

on:
  push:
    branches: [main, master]
    paths:
      - "apps/collector-front/**"
      - ".github/workflows/frontend.yml"
  # Pas de filtre paths ici : ce sont les required status checks de la
  # protection de branche main. Avec un filtre, une PR qui ne touche pas
  # apps/collector-front/** ne declenche jamais ce workflow -> GitHub attend
  # un rapport de statut qui n'arrive jamais ("Waiting for status to be
  # reported" indefiniment, merge bloque).
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Étape 1 — Lint (eslint + prettier), svelte-check et build
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint, Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Svelte check
        run: npm run check

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 1 — Tests (vitest)
  # ────────────────────────────────────────────────────────────────────────────
  tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/collector-front

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 1bis — Tests e2e (Playwright) : parcours utilisateur de bout en bout
  # contre la vraie stack (auth-service, catalog-service...) démarrée via
  # docker compose, pas de mock. Second type de test du pipeline (le premier
  # étant les tests unitaires ci-dessus), voir apps/collector-front/e2e/.
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/collector-front/package-lock.json

      - name: Install dependencies
        working-directory: apps/collector-front
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: apps/collector-front
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/collector-front
        run: npx playwright install --with-deps chromium

      # Stack minimale nécessaire aux 2 specs e2e (auth + catalogue/panier) :
      # on laisse de côté prometheus/grafana, inutiles ici et coûteux en CI.
      - name: Démarrer la stack (docker compose)
        working-directory: apps
        run: |
          docker compose up -d --build \
            postgres rabbitmq auth-service catalog-service \
            notification-service price-tracker mailhog collector-front

      - name: Attendre que le front et auth-service répondent
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5173/ >/dev/null && curl -sf http://localhost:18080/health >/dev/null; then
              echo "Stack prête."
              exit 0
            fi
            sleep 2
          done
          echo "Timeout en attendant la stack." >&2
          exit 1

      - name: Run e2e tests
        working-directory: apps/collector-front
        run: npm run test:e2e

      - name: Upload rapport Playwright (si échec)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/collector-front/playwright-report
          retention-days: 7

      - name: Logs des services (si échec)
        if: failure()
        working-directory: apps
        run: docker compose logs --tail=200

      - name: Arrêter la stack
        if: always()
        working-directory: apps
        run: docker compose down -v

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 2 — SAST : Semgrep (XSS, prototype pollution, open redirect…)
  # Rapport SARIF complet dans l'onglet Security + passe bloquante sur ERROR
  # ────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST Semgrep
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v7

      - name: Semgrep scan (rapport SARIF complet)
        run: semgrep scan --config auto --sarif --output semgrep.sarif apps/collector-front

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-frontend

      - name: Semgrep scan (bloquant sur sévérité ERROR)
        run: semgrep scan --config auto --severity ERROR --error apps/collector-front

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 4 — SCA : Trivy fs sur le lockfile npm (bloquant CRITICAL/HIGH)
  # + npm audit complet en informatif (centaines de packages transitifs)
  # ────────────────────────────────────────────────────────────────────────────
  sca:
    name: SCA dépendances npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7

      - name: Trivy fs scan (bloquant CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/collector-front
          format: sarif
          output: trivy-front-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-front-deps.sarif
          category: trivy-frontend-deps

      - name: npm audit (informatif)
        if: always()
        working-directory: apps/collector-front
        run: npm audit --audit-level=high || true

  # ────────────────────────────────────────────────────────────────────────────
  # Étapes 5-9 — hadolint, build multi-stage adapter-node, scan Trivy AVANT push,
  # push GHCR taggé par SHA, SBOM syft, signature + attestation cosign keyless
  #
  # NB : image agnostique de l'environnement — les URLs d'API sont lues au
  # runtime via $env/dynamic/public (PUBLIC_*, ConfigMap collector-front-config).
  # La MÊME image sert staging et prod ; seule la config de pod change.
  # ────────────────────────────────────────────────────────────────────────────
  image:
    name: Image collector-front
    needs: [quality, tests, e2e, sast, sca]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write # cosign keyless via OIDC

    steps:
      - uses: actions/checkout@v7

      # Étape 5 — lint du Dockerfile
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/collector-front/Dockerfile

      - name: Compute image name (lowercase)
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/collector-front" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Build (local, jamais poussé avant scan)
        uses: docker/build-push-action@v7
        with:
          context: apps/collector-front
          load: true
          tags: ${{ env.IMAGE }}:scan
          # Image agnostique de l'environnement : les URLs d'API sont lues au
          # runtime (PUBLIC_* via la ConfigMap collector-front-config), plus
          # aucun build-arg VITE_* à injecter ici.
          cache-from: type=gha,scope=collector-front
          cache-to: type=gha,mode=max,scope=collector-front

      # Étape 6 — scan de l'image complète, bloquant sur CRITICAL/HIGH
      - name: Trivy image scan (bloquant CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-collector-front.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-collector-front.sarif
          category: trivy-collector-front

      # Étape 9 — push vers GHCR, taggé par SHA de commit (jamais "latest")
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Push
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: apps/collector-front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=collector-front

      # Étape 7 — SBOM SPDX générée depuis l'image poussée
      - name: Generate SBOM (syft)
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom-collector-front.spdx.json
          artifact-name: sbom-collector-front.spdx.json

      # Étape 8 — signature keyless (OIDC GitHub → Rekor) + attestation SBOM
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM (cosign)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate "sbom-collector-front.spdx.json" "${IMAGE}@${DIGEST}"

      - name: Export digest for GitOps job
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          echo "${IMAGE}@${{ steps.push.outputs.digest }}" > /tmp/digests/collector-front

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: digest-collector-front
          path: /tmp/digests/collector-front

  # ────────────────────────────────────────────────────────────────────────────
  # Étape 10/11 — GitOps : commit du nouveau digest dans l'overlay staging.
  # ────────────────────────────────────────────────────────────────────────────
  update-manifests:
    name: GitOps — déploiement staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: image
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: gitops-update-manifests # partagé avec la CI backend pour éviter les push concurrents

    steps:
      # Token dédié (PAT d'un compte Repository admin) au lieu du GITHUB_TOKEN
      # par défaut : le ruleset sur main exige PR + 22 status checks, et la
      # bypass list ("Repository admin", Always allow) ne couvre que les
      # comptes ayant ce rôle — pas l'identité github-actions[bot] du token
      # par défaut. Ce token permet donc au commit GitOps de bypasser le
      # ruleset comme n'importe quel push admin.
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITOPS_PUSH_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Pin new image digest in staging overlay
        working-directory: infra/k8s/overlays/staging
        run: |
          for f in /tmp/digests/*; do
            ref="$(cat "$f")"
            name="${ref%@*}"
            echo "→ ${ref}"
            kustomize edit set image "${name}=${ref}"
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Manifests déjà à jour, rien à committer."
            exit 0
          fi
          git commit -m "ci(gitops): deploy frontend ${GITHUB_SHA::7} to staging"
          git pull --rebase origin main
          git push origin main
