# TEMPLATE — ne jamais committer ce fichier rempli de vraies valeurs.
# Copier vers *.unsealed.yaml (ignoré par Git), remplir, sceller avec kubeseal,
# puis committer UNIQUEMENT le SealedSecret produit. Voir README.md.
apiVersion: v1
kind: Secret
metadata:
  name: collector-secrets
  namespace: collector-staging # ou collector-prod
type: Opaque
stringData:
  # générer avec : openssl rand -base64 32
  # JWT_SECRET doit être identique pour auth-service, catalog-service, notification-service et price-tracker-service.
  JWT_SECRET: CHANGE-ME
  DB_PASSWORD: CHANGE-ME
  # Identifiants RabbitMQ (broker de la chaîne événementielle)
  RABBITMQ_DEFAULT_USER: collector
  RABBITMQ_DEFAULT_PASS: CHANGE-ME
  # URL complète consommée par price-tracker et notification
  RABBITMQ_URL: amqp://collector:CHANGE-ME@rabbitmq:5672/
  # DSN complets (mot de passe inclus) des bases dédiées
  PRICE_DATABASE_DSN: postgres://postgres:CHANGE-ME@postgres:5432/collector_price?sslmode=disable
  NOTIF_DATABASE_DSN: postgres://postgres:CHANGE-ME@postgres:5432/collector_notifications?sslmode=disable
