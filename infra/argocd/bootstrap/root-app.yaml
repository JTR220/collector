# Étape 11 — pattern "App of Apps" : cette application parente déclare toutes
# les autres (infra/argocd/apps/). Ajouter un service ou un composant d'infra
# = committer un YAML dans ce dossier, Argo CD fait le reste.
#
# Bootstrap (une seule commande après l'installation d'Argo CD) :
#   kubectl apply -f infra/argocd/bootstrap/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JTR220/collector.git
    targetRevision: main
    path: infra/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
