# Étape 12 — Sealed Secrets : les secrets sont chiffrés localement avec la clé
# publique du cluster (kubeseal) et commitables sans risque ; seul le controller
# possède la clé privée. Voir infra/secrets/README.md pour l'usage.
#
# ⚠ Sauvegarder la clé privée du controller (sinon secrets indéchiffrables
# après réinstallation) :
#   kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml > sealed-secrets-key.backup.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.x
    helm:
      releaseName: sealed-secrets
      values: |
        # nom attendu par défaut par la CLI kubeseal
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
