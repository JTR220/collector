# Étape 11 — staging : sync AUTOMATIQUE. Un commit de la CI sur l'overlay
# staging est appliqué sans intervention. selfHeal réaligne tout drift manuel
# (kubectl edit sauvage) sur Git ; prune supprime les ressources orphelines.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JTR220/collector.git
    targetRevision: main
    path: infra/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: collector-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # selfHeal réaligne tout drift Git -> cluster, mais les Deployments pilotés
  # par un HPA (voir infra/k8s/base/*/hpa.yaml) changent de replicas en dehors
  # de Git : sans ça, chaque resync ramènerait le pod count au replicas:1 du
  # manifest et annulerait le scaling en plein test de charge.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: auth-service
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: notification-service
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: price-tracker-service
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: collector-front
      jsonPointers:
        - /spec/replicas
