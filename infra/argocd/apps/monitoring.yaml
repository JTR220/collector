# Étape 15 — Observabilité : kube-prometheus-stack (Prometheus, Grafana,
# Alertmanager, exporters). Déployée par Argo CD : la boucle GitOps est fermée.
#
# Accès Grafana en local :
#   kubectl port-forward -n monitoring svc/monitoring-grafana 3001:80
#   (login admin / mot de passe : secret monitoring-grafana)
#
# /metrics expose dans les 4 services Go (prometheus/client_golang) + un
# ServiceMonitor par service (infra/k8s/base/*/servicemonitor.yaml) : ce
# Prometheus les decouvre automatiquement (serviceMonitorSelectorNilUsesHelmValues
# ci-dessous). Un seul cluster sert staging ET prod (namespaces
# collector-staging / collector-prod) : le dashboard fourni
# (infra/k8s/base/monitoring/grafana-dashboard-configmap.yaml) filtre par
# label "namespace", ajoute automatiquement par l'Operator sur chaque cible.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # "*" = dernière version ; épingler une version précise après la première
    # installation pour des upgrades maîtrisés.
    targetRevision: "*"
    helm:
      releaseName: monitoring
      values: |
        prometheus:
          prometheusSpec:
            retention: 7d
            # permet de découvrir les ServiceMonitors de tous les namespaces
            serviceMonitorSelectorNilUsesHelmValues: false
        grafana:
          defaultDashboardsTimezone: Europe/Paris
          sidecar:
            dashboards:
              enabled: true
              # le ConfigMap du dashboard vit dans collector-staging/collector-prod
              # (a cote de l'app, via infra/k8s/base), pas dans le namespace
              # "monitoring" : necessaire pour que le sidecar le trouve.
              searchNamespace: ALL
              label: grafana_dashboard
              labelValue: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs très volumineuses (Prometheus, Alertmanager…)
      - ServerSideApply=true
