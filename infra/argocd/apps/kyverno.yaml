# Étape 14 — Kyverno : moteur d'admission control. Les policies (dossier
# infra/policies) sont déployées par l'application kyverno-policies.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.x
    helm:
      releaseName: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs volumineuses : évite les erreurs "annotation too long"
      - ServerSideApply=true
