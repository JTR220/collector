# Étape 11 — prod : sync MANUEL (pas de bloc automated). Le clic "Sync" dans
# l'UI d'Argo CD est la validation de mise en production. Le diff est visible
# avant d'appliquer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JTR220/collector.git
    targetRevision: main
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: collector-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
