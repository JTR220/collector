# Broker AMQP de la chaine evenementielle (collector.events / collector.alerts).
# StatefulSet 1 replica + PVC : les exchanges/queues durables survivent au redemarrage.
# Image alpine epinglee (pas "latest", pas la variante management) pour la conformite Kyverno.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      automountServiceAccountToken: false
      securityContext:
        # uid/gid de l'utilisateur rabbitmq dans l'image officielle
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # fsGroup peut rendre .erlang.cookie lisible par le groupe au premier
        # montage du volume ; RabbitMQ refuse de demarrer si ce fichier n'est
        # pas strictement 600 (owner only). On force les droits avant chaque
        # demarrage plutot que de compter sur un etat correct herite du PVC.
        - name: fix-cookie-perms
          image: rabbitmq:3.13-alpine
          command:
            - sh
            - -c
            - |
              if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then
                chmod 600 /var/lib/rabbitmq/.erlang.cookie
                chown 999:999 /var/lib/rabbitmq/.erlang.cookie
              fi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-alpine
          ports:
            - name: amqp
              containerPort: 5672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
