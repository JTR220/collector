apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  labels:
    app: catalog-service
spec:
  # Service stateless (plus de volume uploads) : scalable horizontalement.
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nonroot de l'image distroless
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: catalog-service
          # tag/digest épinglé par les overlays (CI → staging, PR → prod)
          image: ghcr.io/jtr220/collector/catalog-service
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: collector-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
