apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nonroot de l'image distroless
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          # tag/digest épinglé par les overlays (CI → staging, PR → prod)
          image: ghcr.io/jtr220/collector/notification-service
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            # fournit FRONTEND_ORIGIN (lu par le middleware CORS)
            - configMapRef:
                name: collector-config
          env:
            - name: PORT
              value: "8083"
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: NOTIF_DATABASE_DSN
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: RABBITMQ_URL
            # même secret que celui qui signe les tokens (auth-service)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_EXCHANGE_EVENTS
              value: "collector.events"
            - name: RABBITMQ_EXCHANGE_ALERTS
              value: "collector.alerts"
            - name: RABBITMQ_QUEUE_PRICE_NOTIF
              value: "notification-service.price.updated"
            - name: RABBITMQ_QUEUE_FRAUD_NOTIF
              value: "notification-service.fraud.alert"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
