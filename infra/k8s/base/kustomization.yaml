# Étape 10 — base Kustomize : description unique des services, patchée par
# les overlays (staging/prod). YAML pur, pas de templating.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: collector
    includeSelectors: false

resources:
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/init-configmap.yaml
  - rabbitmq/statefulset.yaml
  - rabbitmq/service.yaml
  - auth-service/deployment.yaml
  - auth-service/service.yaml
  - auth-service/servicemonitor.yaml
  - auth-service/hpa.yaml
  - catalog-service/deployment.yaml
  - catalog-service/service.yaml
  - catalog-service/pvc.yaml
  - catalog-service/servicemonitor.yaml
  - price-tracker-service/deployment.yaml
  - price-tracker-service/service.yaml
  - price-tracker-service/servicemonitor.yaml
  - price-tracker-service/hpa.yaml
  - notification-service/deployment.yaml
  - notification-service/service.yaml
  - notification-service/servicemonitor.yaml
  - notification-service/hpa.yaml
  - collector-front/deployment.yaml
  - collector-front/service.yaml
  - collector-front/hpa.yaml
  - monitoring/grafana-dashboard-configmap.yaml

# catalog-service reste hors HPA : son volume uploads est ReadWriteOnce,
# donc replicas fige a 1 (voir catalog-service/pvc.yaml).

# URLs d'API consommées au runtime par le front ($env/dynamic/public).
# Valeurs localhost par défaut ; chaque overlay les remplace (behavior: replace)
# par les hosts de son environnement.
configMapGenerator:
  - name: collector-front-config
    literals:
      - PUBLIC_AUTH_API_BASE_URL=http://localhost:8080
      - PUBLIC_CATALOG_API_BASE_URL=http://localhost:8081
      - PUBLIC_PRICE_TRACKER_API_BASE_URL=http://localhost:8082
      - PUBLIC_NOTIFICATION_API_BASE_URL=http://localhost:8083
      - PUBLIC_ENV=production
