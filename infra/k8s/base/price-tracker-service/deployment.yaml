apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-tracker-service
  labels:
    app: price-tracker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-tracker-service
  template:
    metadata:
      labels:
        app: price-tracker-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nonroot de l'image distroless
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: price-tracker-service
          # tag/digest épinglé par les overlays (CI → staging, PR → prod)
          image: ghcr.io/jtr220/collector/price-tracker-service
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            # fournit FRONTEND_ORIGIN (lu par le middleware CORS)
            - configMapRef:
                name: collector-config
          env:
            - name: PORT
              value: "8082"
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: PRICE_DATABASE_DSN
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE_EVENTS
              value: "collector.events"
            - name: RABBITMQ_EXCHANGE_ALERTS
              value: "collector.alerts"
            - name: RABBITMQ_QUEUE_PRICE_UPDATE
              value: "price-tracker.price.updated"
            - name: SPIKE_THRESHOLD_PERCENT
              value: "50"
            - name: SPIKE_WINDOW_HOURS
              value: "24"
            - name: FLOOD_MAX_UPDATES
              value: "5"
            - name: FLOOD_WINDOW_MINUTES
              value: "60"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
