# HPA CPU : voir infra/k8s/base/auth-service/hpa.yaml pour le contexte.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: price-tracker-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: price-tracker-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
