apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nonroot de l'image distroless
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          # tag/digest épinglé par les overlays (CI → staging, PR → prod)
          image: ghcr.io/jtr220/collector/auth-service
          ports:
            - name: http
              containerPort: 8080
            # /metrics : jamais route par l'ingress public (qui ne proxy que
            # le port "http" du Service ci-dessous) ; scrape interne uniquement
            # (ServiceMonitor -> voir servicemonitor.yaml).
            - name: metrics
              containerPort: 9100
          envFrom:
            - configMapRef:
                name: collector-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: JWT_SECRET
            # partagé avec notification-service : authentifie ses appels internes
            # GET /internal/users/:id (middlewares.InternalOnly)
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: INTERNAL_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collector-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
