# Routage host-based prod. En local k3d, ajouter dans le hosts (127.0.0.1) :
#   collector.local  auth.collector.local  api.collector.local
#   notifications.collector.local  price.collector.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector
spec:
  rules:
    - host: collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-front
                port:
                  name: http
    - host: auth.collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  name: http
    - host: api.collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  name: http
    - host: price.collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: price-tracker-service
                port:
                  name: http
    - host: notifications.collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  name: http
