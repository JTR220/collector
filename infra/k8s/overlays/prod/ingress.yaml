# Routage host-based prod sur chaker.pro et ses sous-domaines.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: collector-prod-tls
      hosts:
        - chaker.pro
        - auth.chaker.pro
        - api.chaker.pro
        - price.chaker.pro
        - notifications.chaker.pro
  rules:
    - host: chaker.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-front
                port:
                  name: http
    - host: auth.chaker.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  name: http
    - host: api.chaker.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  name: http
    - host: price.chaker.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: price-tracker-service
                port:
                  name: http
    - host: notifications.chaker.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  name: http
