# Overlay PROD — suivi par Argo CD sur la branche "master" (distincte de
# "main" utilisée par staging). Promotion = le job promote-prod (voir
# .github/workflows/*.yml) ouvre une PR main -> master avec le digest validé ;
# une fois mergée (revue humaine, protection de branche recommandée sur
# master), le clic "Sync" dans l'UI Argo CD est la validation finale.
#
# Le front lit ses URLs d'API au runtime ($env/dynamic/public, PUBLIC_*) : la
# MÊME image que staging est promue en prod, seule la ConfigMap
# collector-front-config (ci-dessous) change pour pointer sur les hosts prod.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collector-prod

resources:
- ../../base
- ingress.yaml
  # Décommenter après génération du SealedSecret (voir infra/secrets/README.md) :
  # - sealed-collector-secrets.yaml

configMapGenerator:
  - name: collector-config
    literals:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=collector
      - DB_USER=postgres
      - FRONTEND_ORIGIN=https://chaker.pro
  # Hosts d'API PROD lus au runtime par le front (remplace les defaults base).
  - name: collector-front-config
    behavior: replace
    literals:
      - PUBLIC_AUTH_API_BASE_URL=https://auth.chaker.pro
      - PUBLIC_CATALOG_API_BASE_URL=https://api.chaker.pro
      - PUBLIC_PRICE_TRACKER_API_BASE_URL=https://price.chaker.pro
      - PUBLIC_NOTIFICATION_API_BASE_URL=https://notifications.chaker.pro

# Promotion manuelle : remplacer newTag par le digest validé en staging, ex :
#   - name: ghcr.io/jtr220/collector/auth-service
#     digest: sha256:abc123...
images:
- digest: sha256:49a716c752555fb013369cef6bfc15438925abeff8de9e94d7dca4944df26bea
  name: ghcr.io/jtr220/collector/auth-service
  newName: ghcr.io/jtr220/collector/auth-service
- digest: sha256:deda429fc44246fd08e71b08676367ce2c9cd22be9a74453f08eb7c698ad8ea9
  name: ghcr.io/jtr220/collector/catalog-service
  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:294fc75ef0488a0dd71908eb817ea62e33ef94d0561f599f975ad1a9fccca19c
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
- digest: sha256:fd544264653e45a55b806009f4ab639960ec350ba45a37137be32d6f1e889840
  name: ghcr.io/jtr220/collector/notification-service
  newName: ghcr.io/jtr220/collector/notification-service
- digest: sha256:5d48e604b2f6cec0016f17e4c90191577b9cd380723c43345cae2ba1ed5b1a94
  name: ghcr.io/jtr220/collector/price-tracker-service
  newName: ghcr.io/jtr220/collector/price-tracker-service

  # Plus de replicas et de ressources en prod.
  # catalog-service reste à 1 replica : son volume uploads est en ReadWriteOnce.
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 512Mi
  target:
    kind: Deployment
    name: auth-service
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: collector-front
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 512Mi
  target:
    kind: Deployment
    name: catalog-service
