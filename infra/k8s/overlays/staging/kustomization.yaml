# Overlay STAGING — synchronisé automatiquement par Argo CD (prune + selfHeal).
# Les digests d'images sont épinglés par la CI (job update-manifests) :
# l'historique Git de ce fichier EST le journal des déploiements staging.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collector-staging

  # Décommenter après génération du SealedSecret (voir infra/secrets/README.md) :
resources:
- ../../base
- ingress.yaml
- sealed-collector-secrets.yaml

# Hosts d'API STAGING lus au runtime par le front (remplace les defaults base).
configMapGenerator:
- literals:
  - DB_HOST=postgres
  - DB_PORT=5432
  - DB_NAME=collector
  - DB_USER=postgres
  - FRONTEND_ORIGIN=http://collector.staging.local
  name: collector-config
- behavior: replace
  literals:
  - PUBLIC_AUTH_API_BASE_URL=http://auth.collector.staging.local
  - PUBLIC_CATALOG_API_BASE_URL=http://api.collector.staging.local
  - PUBLIC_PRICE_TRACKER_API_BASE_URL=http://price.collector.staging.local
  - PUBLIC_NOTIFICATION_API_BASE_URL=http://notifications.collector.staging.local
  name: collector-front-config

# "bootstrap" est un placeholder : remplacé par un digest immuable
# (image@sha256:...) au premier passage de la CI.
images:
- digest: sha256:15fef1883c230bbaff32d1b3717236fdcabf77f80626ccaaf8a13cf23b3dab12
  name: ghcr.io/jtr220/collector/auth-service
  newName: ghcr.io/jtr220/collector/auth-service
- digest: sha256:08ab9959241632d60f16e859ed71b4feaee3128dfac15ddc3d0ae19c30845f57
  name: ghcr.io/jtr220/collector/catalog-service
  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:1df32a4a5e99910f3bb8a95dd26cb1d2e1c4f3f6f78dc2474b009d07eba06b6e
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
- digest: sha256:3b62d333c9acf1461306725596d5989e6cda1d6073d09cf8176c98eb7031afe6
  name: ghcr.io/jtr220/collector/notification-service
  newName: ghcr.io/jtr220/collector/notification-service
- digest: sha256:6c1afab801b1c313be2d9ad1a5c7f2923573893da24dfaefcf47bd2a3bdbd63c
