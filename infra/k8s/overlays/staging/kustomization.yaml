  name: ghcr.io/jtr220/collector/catalog-service
  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:f03deb2dbc2ef582bd579bbd5760b15bfbf375a9c106d0187d26096184f6c596
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
