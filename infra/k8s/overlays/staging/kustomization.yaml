  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:c5ff3cf56ad5f96c49fcb03bede80a6eb1ac0bed3523207168ab1b3171943fe2
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
- digest: sha256:43133b6f6941bb15cd4c836e65bd791e61c426c55dcc3c467b166135808ada57
