# Overlay STAGING — synchronisé automatiquement par Argo CD (prune + selfHeal).
# Les digests d'images sont épinglés par la CI (job update-manifests) :
# l'historique Git de ce fichier EST le journal des déploiements staging.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collector-staging

  # Décommenter après génération du SealedSecret (voir infra/secrets/README.md) :
resources:
- ../../base
- ingress.yaml
- certificate.yaml
- sealed-collector-secrets.yaml

# Hosts d'API STAGING lus au runtime par le front (remplace les defaults base).
# HTTPS via Let's Encrypt sur staging.chaker.pro:8443, routage par path.
configMapGenerator:
- literals:
  - DB_HOST=postgres
  - DB_PORT=5432
  - DB_NAME=collector
  - DB_USER=postgres
  - FRONTEND_ORIGIN=https://staging.chaker.pro:8443
  name: collector-config
- behavior: replace
  literals:
  - PUBLIC_AUTH_API_BASE_URL=https://staging.chaker.pro:8443/auth
  - PUBLIC_CATALOG_API_BASE_URL=https://staging.chaker.pro:8443/api
  - PUBLIC_PRICE_TRACKER_API_BASE_URL=https://staging.chaker.pro:8443/price
  - PUBLIC_NOTIFICATION_API_BASE_URL=https://staging.chaker.pro:8443/notifications
  - PUBLIC_ENV=staging
  name: collector-front-config

# "bootstrap" est un placeholder : remplacé par un digest immuable
# (image@sha256:...) au premier passage de la CI.
images:
- digest: sha256:f4b380af8285f456fe411035e9a062d43122bfd4182f6261c4cc08f8a5a33a86
  name: ghcr.io/jtr220/collector/auth-service
  newName: ghcr.io/jtr220/collector/auth-service
- digest: sha256:d284379884f7bc0ec91e5ef4677315e899d5c659cb709d13ba164c975811dbf3
  name: ghcr.io/jtr220/collector/catalog-service
  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:c0f350b97fc0a04db79ac133faabdb9f1b34106ca8806ba3178d8693c6e06db2
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
- digest: sha256:935ec84685931701af797b02929511cad53f68188e73d38947bc7a4e23302458
  name: ghcr.io/jtr220/collector/notification-service
