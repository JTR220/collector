# Overlay STAGING — synchronisé automatiquement par Argo CD (prune + selfHeal).
# Les digests d'images sont épinglés par la CI (job update-manifests) :
# l'historique Git de ce fichier EST le journal des déploiements staging.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collector-staging

  # Décommenter après génération du SealedSecret (voir infra/secrets/README.md) :
resources:
- ../../base
- ingress.yaml
- sealed-collector-secrets.yaml

# Hosts d'API STAGING lus au runtime par le front (remplace les defaults base).
# HTTPS via cert-manager/Let's Encrypt (infra/cert-manager) sur des hosts
# nip.io (pas de nom de domaine possede, voir ingress.yaml).
configMapGenerator:
- literals:
  - DB_HOST=postgres
  - DB_PORT=5432
  - DB_NAME=collector
  - DB_USER=postgres
  - FRONTEND_ORIGIN=https://collector.51.255.199.160.nip.io
  name: collector-config
- behavior: replace
  literals:
  - PUBLIC_AUTH_API_BASE_URL=https://auth.51.255.199.160.nip.io
  - PUBLIC_CATALOG_API_BASE_URL=https://api.51.255.199.160.nip.io
  - PUBLIC_PRICE_TRACKER_API_BASE_URL=https://price.51.255.199.160.nip.io
  - PUBLIC_NOTIFICATION_API_BASE_URL=https://notifications.51.255.199.160.nip.io
  name: collector-front-config

# "bootstrap" est un placeholder : remplacé par un digest immuable
# (image@sha256:...) au premier passage de la CI.
images:
- digest: sha256:750316902397ac6bc77c5a0c89bed5bef49d7e22b775b6ae74ba15115ff9e590
  name: ghcr.io/jtr220/collector/auth-service
  newName: ghcr.io/jtr220/collector/auth-service
- digest: sha256:add09627bce949df3976e8aa5b9030e09bad25b0ebc4baed444ebc33f9260376
  name: ghcr.io/jtr220/collector/catalog-service
  newName: ghcr.io/jtr220/collector/catalog-service
- digest: sha256:44bbce57698427bc8499d06fd5cb5ed3fb937847a3bde7404e8eca541e39b90f
  name: ghcr.io/jtr220/collector/collector-front
  newName: ghcr.io/jtr220/collector/collector-front
- digest: sha256:e3616d959dd62323379cdab4d49cb3bc8b4eefe0bb6515b664b1030416caa160
  name: ghcr.io/jtr220/collector/notification-service
