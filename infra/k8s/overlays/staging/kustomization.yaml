# Overlay STAGING — synchronisé automatiquement par Argo CD (prune + selfHeal).
# Les digests d'images sont épinglés par la CI (job update-manifests) :
# l'historique Git de ce fichier EST le journal des déploiements staging.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: collector-staging

resources:
- ../../base
- ingress.yaml
- certificate.yaml
- sealed-collector-secrets.yaml

# Hosts d'API STAGING lus au runtime par le front (remplace les defaults base).
# HTTPS via Let's Encrypt sur staging.chaker.pro:8443, routage par path.
  # DNS interne au cluster : notification-service resout le nom du
  # destinataire d'un message via GET /internal/users/:id sur auth-service
  # HTTPS (Let's Encrypt) : le cookie de session httpOnly doit etre marque
  # Secure. Pas de COOKIE_DOMAIN : staging est mono-host (routage par path
  # via Traefik, voir ingress.yaml), un cookie "host-only" suffit.
  # DNS interne au cluster : cascade d'anonymisation (auth-service ->
  # catalog-service/notification-service) a la suppression d'un compte
  # (droit a l'effacement, art. 17 RGPD).
configMapGenerator:
- literals:
  - DB_HOST=postgres
  - DB_PORT=5432
  - DB_NAME=collector
  - DB_USER=postgres
  - FRONTEND_ORIGIN=https://staging.chaker.pro:8443
  - AUTH_SERVICE_URL=http://auth-service
  - CATALOG_SERVICE_URL=http://catalog-service
  - NOTIFICATION_SERVICE_URL=http://notification-service
  - COOKIE_SECURE=true
  name: collector-config
- behavior: replace
  literals:
  - PUBLIC_AUTH_API_BASE_URL=https://staging.chaker.pro:8443/auth
  - PUBLIC_CATALOG_API_BASE_URL=https://staging.chaker.pro:8443/api
  - PUBLIC_PRICE_TRACKER_API_BASE_URL=https://staging.chaker.pro:8443/price
  - PUBLIC_NOTIFICATION_API_BASE_URL=https://staging.chaker.pro:8443/notifications
  - PUBLIC_ENV=staging
  name: collector-front-config

# "bootstrap" est un placeholder : remplacé par un digest immuable
# (image@sha256:...) au premier passage de la CI.
