# Routage par path sur IP nue (k3d/k3s : Traefik est l'ingress class par defaut).
# Pas de nom de domaine possede, et une IP ne peut pas porter de sous-domaines
# -> un seul host (l'IP), les services sont distingues par prefixe de chemin
# (/auth, /api, /price, /notifications), strip via Middleware Traefik.
# TLS via certificat self-signed avec l'IP en SAN (voir certificate.yaml et
# infra/cert-manager/cluster-issuer.yaml) : Let's Encrypt n'emet pas de
# certificat pour une IP nue.
# entryPoint "staging" (port 8443) au lieu de "websecure" (443, utilise par
# la prod) : distingue visuellement l'URL staging de la prod. Voir
# infra/traefik/helmchartconfig.yaml.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth-prefix
spec:
  stripPrefix:
    prefixes:
      - /auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-price-prefix
spec:
  stripPrefix:
    prefixes:
      - /price
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-notifications-prefix
spec:
  stripPrefix:
    prefixes:
      - /notifications
---
# IngressRoute (CRD Traefik) plutot qu'un Ingress standard : necessaire pour
# appliquer un Middleware different par path (un Ingress "vanilla" applique
# ses middlewares a toutes les routes, ce qui stripperait /auth des requetes
# destinees a /api etc.)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: collector
spec:
  entryPoints:
    - staging
  tls:
    secretName: collector-selfsigned-tls
  routes:
    - match: PathPrefix(`/auth`)
      kind: Rule
      middlewares:
        - name: strip-auth-prefix
      services:
        - name: auth-service
          port: http
    - match: PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
      services:
        - name: catalog-service
          port: http
    - match: PathPrefix(`/price`)
      kind: Rule
      middlewares:
        - name: strip-price-prefix
      services:
        - name: price-tracker-service
          port: http
    - match: PathPrefix(`/notifications`)
      kind: Rule
      middlewares:
        - name: strip-notifications-prefix
      services:
        - name: notification-service
          port: http
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: collector-front
          port: http
