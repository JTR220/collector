# Routage host-based (k3d/k3s : Traefik est l'ingress class par défaut).
# À ajouter dans le hosts du poste de travail (127.0.0.1) :
#   collector.staging.local  auth.collector.staging.local  api.collector.staging.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector
spec:
  rules:
    - host: collector.staging.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-front
                port:
                  name: http
    - host: auth.collector.staging.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  name: http
    - host: api.collector.staging.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  name: http
