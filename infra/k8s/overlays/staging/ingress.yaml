# Routage host-based (k3d/k3s : Traefik est l'ingress class par défaut).
# Pas de nom de domaine possede -> hosts en <sous-domaine>.51.255.199.160.nip.io
# (DNS public gratuit qui resout vers l'IP embarquee dans le nom, ce qui
# permet un vrai certificat Let's Encrypt sans rien configurer cote DNS).
# Traefik gere nativement l'upgrade WebSocket (/ws) — aucune annotation requise.
#
# Validation effectuee le 2026-07-07 avec letsencrypt-staging (challenge
# HTTP-01 confirme OK, Certificate Ready=True) avant bascule sur
# letsencrypt-prod ci-dessous pour un certificat fiable par les navigateurs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - collector.51.255.199.160.nip.io
        - auth.51.255.199.160.nip.io
        - api.51.255.199.160.nip.io
        - price.51.255.199.160.nip.io
        - notifications.51.255.199.160.nip.io
      secretName: collector-staging-tls
  rules:
    - host: collector.51.255.199.160.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-front
                port:
                  name: http
    - host: auth.51.255.199.160.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  name: http
    - host: api.51.255.199.160.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  name: http
    - host: price.51.255.199.160.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: price-tracker-service
                port:
                  name: http
    - host: notifications.51.255.199.160.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  name: http
