# Routage staging par path sur staging.chaker.pro:8443.
# Les services sont distingues par prefixe de chemin
# (/auth, /api, /price, /notifications), strip via Middleware Traefik.
# entryPoint "staging" (port 8443) au lieu de "websecure" (443, utilise par
# la prod) : distingue visuellement l'URL staging de la prod. Voir
# infra/traefik/helmchartconfig.yaml.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth-prefix
spec:
  stripPrefix:
    prefixes:
      - /auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-price-prefix
spec:
  stripPrefix:
    prefixes:
      - /price
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-notifications-prefix
spec:
  stripPrefix:
    prefixes:
      - /notifications
---
# IngressRoute (CRD Traefik) plutot qu'un Ingress standard : necessaire pour
# appliquer un Middleware different par path (un Ingress "vanilla" applique
# ses middlewares a toutes les routes, ce qui stripperait /auth des requetes
# destinees a /api etc.)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: collector
spec:
  entryPoints:
    - staging
  tls:
    secretName: collector-staging-tls
  routes:
    - match: Host(`staging.chaker.pro`) && PathPrefix(`/auth`)
      kind: Rule
      middlewares:
        - name: strip-auth-prefix
      services:
        - name: auth-service
          port: http
    - match: Host(`staging.chaker.pro`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
      services:
        - name: catalog-service
          port: http
    - match: Host(`staging.chaker.pro`) && PathPrefix(`/price`)
      kind: Rule
      middlewares:
        - name: strip-price-prefix
      services:
        - name: price-tracker-service
          port: http
    - match: Host(`staging.chaker.pro`) && PathPrefix(`/notifications`)
      kind: Rule
      middlewares:
        - name: strip-notifications-prefix
      services:
        - name: notification-service
          port: http
    - match: Host(`staging.chaker.pro`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: collector-front
          port: http
