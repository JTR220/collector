# Canary simple à deux paliers (25 % / pause manuelle / 100 %) sur
# catalog-service. Voir README.md pour l'activation.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: catalog-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  # référence le Deployment existant : pas de duplication de manifest
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
    scaleDown: progressively
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {} # promotion manuelle : kubectl argo rollouts promote catalog-service
        - setWeight: 100
      # ── Analyse automatique (à activer quand /metrics sera exposé) ──
      # analysis:
      #   templates:
      #     - templateName: success-rate
      #   args:
      #     - name: service-name
      #       value: catalog-service
---
